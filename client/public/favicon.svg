<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Ticket Master favicon.
       Design: flat #2563eb brand-blue square with slight 4-unit corner
       radius (subtle, invisible at 16x16, gentle at large sizes). White
       bold geometric "T" occupying ~66% of the canvas with lightly
       rounded terminals for a modern, premium feel. No gradients, no
       text, no drop shadow. Legible at 16x16.
       Author lock: single source of truth — regenerate every raster
       via scripts/build-favicon.mjs when this file changes. -->
  <rect width="64" height="64" rx="4" fill="#2563EB"/>
  <!-- Horizontal bar of the T -->
  <rect x="10" y="14" width="44" height="12" rx="2" fill="#FFFFFF"/>
  <!-- Vertical stem of the T -->
  <rect x="25" y="14" width="14" height="40" rx="2" fill="#FFFFFF"/>
</svg>
