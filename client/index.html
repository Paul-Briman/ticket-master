    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Favicon set. Modern browsers pick the SVG (scales to any DPI),
         older browsers fall back to sized PNGs, iOS home-screen uses
         apple-touch-icon, and Windows / legacy tools use favicon.ico.
         All artifacts come from scripts/build-favicon.mjs — regenerate
         via `node scripts/build-favicon.mjs` when client/public/favicon.svg
         changes. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <title>TicketMaster</title>
  </head>
